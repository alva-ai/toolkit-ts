name: Audit skill registry

# Audits src/resources/skillTiers.ts against the live Arrays doc registry.
# On drift, files (or updates) a single tracking issue and fails the run.

on:
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: audit-skill-registry
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run audit
        id: audit
        run: |
          set +e
          node scripts/audit-skill-registry.mjs > audit-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat audit-report.md

      - name: File or update drift issue
        if: steps.audit.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Skill registry drift detected"
          BODY_FILE=audit-report.md
          {
            echo
            echo "---"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$BODY_FILE"
          # Find an existing open issue with this exact title (idempotent updates)
          NUMBER=$(gh issue list --state open --json number,title \
            --jq '[.[] | select(.title=="'"$TITLE"'") | .number] | .[0] // empty')
          if [ -n "$NUMBER" ]; then
            gh issue edit "$NUMBER" --body-file "$BODY_FILE"
            gh issue comment "$NUMBER" --body "Drift still present as of $(date -u +%FT%TZ). See latest body."
          else
            gh issue create --title "$TITLE" --body-file "$BODY_FILE"
          fi

      - name: Fail if drift
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1
