name: Audit skill registry

# Audits src/resources/skillTiers.ts against the live Arrays doc registry.
# On drift, rewrites the file and opens (or updates) a fix PR. Reviewers
# must verify the auto-added rows — they default to the pro tier with a
# TODO(audit) comment.

on:
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write # needed to dispatch ci.yml on the fix branch

concurrency:
  group: audit-skill-registry
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run audit (--apply)
        id: audit
        run: |
          set +e
          node scripts/audit-skill-registry.mjs --apply > audit-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat audit-report.md

      - name: Open or update fix PR
        if: steps.audit.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="audit/skill-registry-drift"
          TITLE="audit: skill registry drift"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/resources/skillTiers.ts
          if git diff --cached --quiet; then
            echo "audit reported drift but produced no file diff — bailing"
            exit 1
          fi
          MSG=$(mktemp)
          {
            echo "audit: sync skillTiers with Arrays doc registry"
            echo
            echo "Auto-generated by .github/workflows/audit-skill-registry.yml."
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "Reviewer must verify the tier on every row marked with TODO(audit)."
          } > "$MSG"
          git commit --file "$MSG"
          git push --force-with-lease origin "$BRANCH"

          {
            echo
            echo "---"
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> audit-report.md

          NUMBER=$(gh pr list --state open --head "$BRANCH" --json number \
            --jq '.[0].number // empty')
          if [ -n "$NUMBER" ]; then
            gh pr edit "$NUMBER" --body-file audit-report.md
            gh pr comment "$NUMBER" --body "Drift still present as of $(date -u +%FT%TZ). Branch force-updated; body refreshed."
          elif gh pr create --title "$TITLE" --body-file audit-report.md \
              --head "$BRANCH" --base main; then
            echo "Opened fix PR on $BRANCH"
          else
            echo "::warning::Could not open PR (org may block Actions from creating PRs). Branch $BRANCH was pushed — open a PR manually."
          fi

          # GITHUB_TOKEN-driven pushes do NOT trigger pull_request / push
          # workflows on the fix branch, so required checks would never run.
          # workflow_dispatch IS the documented exception that fires even
          # when caused by GITHUB_TOKEN, so explicitly dispatch CI here.
          if ! gh workflow run ci.yml --ref "$BRANCH"; then
            echo "::warning::Could not dispatch CI on $BRANCH — run it manually if needed."
          fi

      - name: Fail if drift
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1
